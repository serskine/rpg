<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Table -->
  <defs>
    <linearGradient id="tableWoodGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9D6E47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D4A38;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Tabletop surface -->
  <ellipse cx="50" cy="35" rx="28" ry="12" fill="url(#tableWoodGradient)" stroke="#4A3728" stroke-width="1.5"/>
  
  <!-- Tabletop edge highlight -->
  <ellipse cx="50" cy="33" rx="28" ry="12" fill="none" stroke="#B8956F" stroke-width="1" opacity="0.5"/>
  
  <!-- Left leg -->
  <rect x="25" y="45" width="4" height="28" fill="#6D4A38" stroke="#3E2723" stroke-width="1"/>
  
  <!-- Right leg -->
  <rect x="71" y="45" width="4" height="28" fill="#6D4A38" stroke="#3E2723" stroke-width="1"/>
  
  <!-- Leg braces -->
  <line x1="29" y1="55" x2="71" y2="55" stroke="#5C4A38" stroke-width="2" opacity="0.7"/>
  <line x1="29" y1="65" x2="71" y2="65" stroke="#5C4A38" stroke-width="2" opacity="0.7"/>
  
  <!-- Wood grain texture -->
  <line x1="30" y1="35" x2="70" y2="35" stroke="#5C4A38" stroke-width="0.5" opacity="0.3"/>
  <line x1="28" y1="40" x2="72" y2="40" stroke="#5C4A38" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Underside shelf support -->
  <ellipse cx="50" cy="70" rx="28" ry="4" fill="#5C4A38" opacity="0.6"/>
  
  <!-- Shadow -->
  <ellipse cx="50" cy="73" rx="30" ry="2" fill="#000000" opacity="0.15"/>
</svg>
