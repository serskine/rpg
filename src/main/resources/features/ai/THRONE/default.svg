<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Throne -->
  <defs>
    <linearGradient id="throneGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5C2F0F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Seat -->
  <ellipse cx="50" cy="55" rx="15" ry="8" fill="url(#throneGradient)" stroke="#3E2723" stroke-width="1.5"/>
  
  <!-- Backrest -->
  <path d="M 40 55 L 35 25 Q 35 20 40 20 L 60 20 Q 65 20 65 25 L 60 55" fill="url(#throneGradient)" stroke="#3E2723" stroke-width="1.5"/>
  
  <!-- Left armrest -->
  <path d="M 38 48 L 32 52 Q 30 55 32 58" fill="url(#throneGradient)" stroke="#3E2723" stroke-width="1.5"/>
  
  <!-- Right armrest -->
  <path d="M 62 48 L 68 52 Q 70 55 68 58" fill="url(#throneGradient)" stroke="#3E2723" stroke-width="1.5"/>
  
  <!-- Front legs -->
  <rect x="42" y="62" width="4" height="15" fill="#5C2F0F"/>
  <rect x="54" y="62" width="4" height="15" fill="#5C2F0F"/>
  
  <!-- Decorative crown top -->
  <path d="M 40 20 L 43 15 L 46 18 L 50 12 L 54 18 L 57 15 L 60 20" fill="#FFD700" stroke="#DAA520" stroke-width="1" opacity="0.8"/>
  
  <!-- Backrest detail -->
  <line x1="45" y1="30" x2="45" y2="50" stroke="#3E2723" stroke-width="0.5" opacity="0.3"/>
  <line x1="50" y1="30" x2="50" y2="50" stroke="#3E2723" stroke-width="0.5" opacity="0.3"/>
  <line x1="55" y1="30" x2="55" y2="50" stroke="#3E2723" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Shadow -->
  <ellipse cx="50" cy="77" rx="18" ry="2" fill="#000000" opacity="0.15"/>
</svg>
