<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Book Shelf -->
  <defs>
    <linearGradient id="shelfWoodGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A0826D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D4A38;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Frame/back -->
  <rect x="15" y="20" width="70" height="55" fill="url(#shelfWoodGradient)" stroke="#4A3728" stroke-width="1.5" rx="2"/>
  
  <!-- Vertical dividers -->
  <line x1="38" y1="25" x2="38" y2="70" stroke="#4A3728" stroke-width="1.5" opacity="0.6"/>
  <line x1="62" y1="25" x2="62" y2="70" stroke="#4A3728" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Shelves -->
  <rect x="20" y="35" width="60" height="2" fill="#5C4A38" stroke="#3E2723" stroke-width="0.5"/>
  <rect x="20" y="48" width="60" height="2" fill="#5C4A38" stroke="#3E2723" stroke-width="0.5"/>
  <rect x="20" y="61" width="60" height="2" fill="#5C4A38" stroke="#3E2723" stroke-width="0.5"/>
  
  <!-- Books on shelves -->
  <!-- Top shelf books -->
  <rect x="25" y="25" width="4" height="8" fill="#8B0000" stroke="#5C0000" stroke-width="0.5"/>
  <rect x="31" y="25" width="4" height="8" fill="#D4AF37" stroke="#AA8C2E" stroke-width="0.5"/>
  <rect x="37" y="25" width="4" height="8" fill="#228B22" stroke="#155B15" stroke-width="0.5"/>
  <rect x="43" y="25" width="3" height="8" fill="#191970" stroke="#0F0F47" stroke-width="0.5"/>
  
  <!-- Middle shelf books -->
  <rect x="25" y="38" width="4" height="8" fill="#D2691E" stroke="#8B4513" stroke-width="0.5"/>
  <rect x="31" y="38" width="4" height="8" fill="#8B0000" stroke="#5C0000" stroke-width="0.5"/>
  <rect x="37" y="38" width="4" height="8" fill="#4B0082" stroke="#2F004F" stroke-width="0.5"/>
  
  <!-- Bottom shelf books -->
  <rect x="25" y="51" width="4" height="8" fill="#228B22" stroke="#155B15" stroke-width="0.5"/>
  <rect x="31" y="51" width="4" height="8" fill="#D4AF37" stroke="#AA8C2E" stroke-width="0.5"/>
  <rect x="37" y="51" width="3" height="8" fill="#8B0000" stroke="#5C0000" stroke-width="0.5"/>
  
  <!-- Shadow -->
  <ellipse cx="50" cy="75" rx="35" ry="2" fill="#000000" opacity="0.15"/>
</svg>
