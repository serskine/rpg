<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Coffin -->
  <defs>
    <linearGradient id="coffinGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5C4A38;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3E2723;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Coffin lid -->
  <path d="M 25 35 L 50 30 L 75 35 L 75 50 L 25 50 Z" fill="url(#coffinGradient)" stroke="#1A1A1A" stroke-width="1.5"/>
  
  <!-- Coffin body -->
  <path d="M 25 50 L 20 65 L 80 65 L 75 50 Z" fill="url(#coffinGradient)" stroke="#1A1A1A" stroke-width="1.5"/>
  
  <!-- Handles -->
  <circle cx="28" cy="57" r="2" fill="#8B7355" stroke="#3E2723" stroke-width="1" opacity="0.8"/>
  <circle cx="72" cy="57" r="2" fill="#8B7355" stroke="#3E2723" stroke-width="1" opacity="0.8"/>
  
  <!-- Coffin details/nails -->
  <circle cx="40" cy="42" r="1" fill="#DAA520" opacity="0.7"/>
  <circle cx="60" cy="42" r="1" fill="#DAA520" opacity="0.7"/>
  <circle cx="35" cy="58" r="1" fill="#DAA520" opacity="0.7"/>
  <circle cx="65" cy="58" r="1" fill="#DAA520" opacity="0.7"/>
  
  <!-- Cross symbol -->
  <line x1="50" y1="40" x2="50" y2="52" stroke="#DAA520" stroke-width="1.5" opacity="0.6"/>
  <line x1="45" y1="46" x2="55" y2="46" stroke="#DAA520" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Shadow -->
  <ellipse cx="50" cy="67" rx="30" ry="2" fill="#000000" opacity="0.15"/>
</svg>
