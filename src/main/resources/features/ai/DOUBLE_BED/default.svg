<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Double Bed -->
  <defs>
    <linearGradient id="bedFrameGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5C2F0F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mattressGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0826D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Bed frame -->
  <rect x="10" y="35" width="80" height="40" fill="url(#bedFrameGradient)" stroke="#3E2723" stroke-width="2" rx="3"/>
  
  <!-- Mattress -->
  <rect x="15" y="40" width="70" height="30" fill="url(#mattressGradient)" stroke="#8B6F47" stroke-width="1.5" rx="2"/>
  
  <!-- Pillows at head -->
  <rect x="20" y="42" width="20" height="8" fill="#CD853F" stroke="#8B6F47" stroke-width="1" rx="1" opacity="0.9"/>
  <rect x="42" y="42" width="20" height="8" fill="#CD853F" stroke="#8B6F47" stroke-width="1" rx="1" opacity="0.9"/>
  
  <!-- Blanket/bedding folds -->
  <path d="M 15 55 Q 25 50 35 55 Q 45 50 55 55 Q 65 50 75 55 Q 75 65 15 65" fill="#8B4513" opacity="0.6" stroke="#5C2F0F" stroke-width="1"/>
  
  <!-- Bedposts -->
  <rect x="12" y="30" width="3" height="50" fill="#5C2F0F"/>
  <rect x="85" y="30" width="3" height="50" fill="#5C2F0F"/>
  
  <!-- Headboard detail -->
  <line x1="20" y1="35" x2="20" y2="25" stroke="#8B6F47" stroke-width="1.5"/>
  <line x1="50" y1="35" x2="50" y2="25" stroke="#8B6F47" stroke-width="1.5"/>
  <line x1="80" y1="35" x2="80" y2="25" stroke="#8B6F47" stroke-width="1.5"/>
  
  <!-- Shadow -->
  <ellipse cx="50" cy="75" rx="40" ry="3" fill="#000000" opacity="0.15"/>
</svg>
