<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Teleportation Circle -->
  <defs>
    <radialGradient id="teleportGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#9C27B0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6A1B9A;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#38006B;stop-opacity:0.6" />
    </radialGradient>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="url(#teleportGradient)" stroke-width="3"/>
  
  <!-- Inner circles -->
  <circle cx="50" cy="50" r="24" fill="none" stroke="#9C27B0" stroke-width="1.5" opacity="0.7"/>
  <circle cx="50" cy="50" r="18" fill="none" stroke="#9C27B0" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Center glow -->
  <circle cx="50" cy="50" r="12" fill="url(#teleportGradient)" opacity="0.4"/>
  
  <!-- Runes/symbols around circle -->
  <circle cx="50" cy="22" r="2" fill="#9C27B0" opacity="0.8"/>
  <circle cx="78" cy="50" r="2" fill="#9C27B0" opacity="0.8"/>
  <circle cx="50" cy="78" r="2" fill="#9C27B0" opacity="0.8"/>
  <circle cx="22" cy="50" r="2" fill="#9C27B0" opacity="0.8"/>
  
  <!-- Diagonal runes -->
  <circle cx="65" cy="35" r="1.5" fill="#9C27B0" opacity="0.6"/>
  <circle cx="65" cy="65" r="1.5" fill="#9C27B0" opacity="0.6"/>
  <circle cx="35" cy="35" r="1.5" fill="#9C27B0" opacity="0.6"/>
  <circle cx="35" cy="65" r="1.5" fill="#9C27B0" opacity="0.6"/>
  
  <!-- Energy lines -->
  <path d="M 40 40 Q 50 45 60 40" stroke="#CE93D8" stroke-width="0.5" fill="none" opacity="0.5"/>
  <path d="M 40 60 Q 50 55 60 60" stroke="#CE93D8" stroke-width="0.5" fill="none" opacity="0.5"/>
  
  <!-- Shadow -->
  <ellipse cx="50" cy="82" rx="32" ry="2" fill="#000000" opacity="0.1"/>
</svg>
