<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Fountain -->
  <defs>
    <radialGradient id="waterGradient" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:0.6" />
    </radialGradient>
    <linearGradient id="stoneGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B0A89C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7F7A6F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Base -->
  <circle cx="50" cy="70" r="32" fill="url(#stoneGradient2)" stroke="#4A4A4A" stroke-width="1.5"/>
  
  <!-- Basin rim -->
  <ellipse cx="50" cy="70" rx="32" ry="8" fill="none" stroke="#4A4A4A" stroke-width="1.5"/>
  
  <!-- Water in basin -->
  <ellipse cx="50" cy="72" rx="30" ry="6" fill="url(#waterGradient)" opacity="0.7"/>
  
  <!-- Central column -->
  <rect x="48" y="40" width="4" height="35" fill="url(#stoneGradient2)" stroke="#4A4A4A" stroke-width="1"/>
  
  <!-- Upper basin/spillway -->
  <circle cx="50" cy="40" r="12" fill="url(#stoneGradient2)" stroke="#4A4A4A" stroke-width="1.5"/>
  <ellipse cx="50" cy="42" rx="10" ry="5" fill="url(#waterGradient)" opacity="0.6"/>
  
  <!-- Water spray effect -->
  <path d="M 45 38 Q 40 30 38 20" stroke="#87CEEB" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 55 38 Q 60 30 62 20" stroke="#87CEEB" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Decorative detail -->
  <circle cx="50" cy="40" r="8" fill="none" stroke="#9A9A9A" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Shadow -->
  <ellipse cx="50" cy="77" rx="32" ry="3" fill="#000000" opacity="0.2"/>
</svg>
