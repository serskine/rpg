<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Altar - Religious structure with chalice -->
  <defs>
    <linearGradient id="stoneGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5C4033;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Base platform -->
  <rect x="15" y="60" width="70" height="20" fill="url(#stoneGradient)" stroke="#3E2723" stroke-width="1.5"/>
  
  <!-- Main altar body -->
  <rect x="20" y="35" width="60" height="25" fill="url(#stoneGradient)" stroke="#3E2723" stroke-width="1.5" rx="2"/>
  
  <!-- Top surface details -->
  <rect x="25" y="38" width="50" height="3" fill="#A1887F" opacity="0.6"/>
  
  <!-- Decorative columns -->
  <rect x="22" y="40" width="5" height="20" fill="#6D4C41"/>
  <rect x="73" y="40" width="5" height="20" fill="#6D4C41"/>
  
  <!-- Chalice/Holy vessel -->
  <circle cx="50" cy="42" r="6" fill="#FFD700" stroke="#DAA520" stroke-width="1.5"/>
  <path d="M 50 35 L 52 42 L 48 42 Z" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
  
  <!-- Shadow -->
  <ellipse cx="50" cy="78" rx="30" ry="2" fill="#000000" opacity="0.1"/>
</svg>
