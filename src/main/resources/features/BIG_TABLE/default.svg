<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Big Table -->
  <defs>
    <linearGradient id="tableGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9D6E47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D4A38;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Tabletop -->
  <ellipse cx="50" cy="40" rx="32" ry="14" fill="url(#tableGrad)" stroke="#4A3728" stroke-width="1.5"/>
  <ellipse cx="50" cy="38" rx="32" ry="14" fill="none" stroke="#B8956F" stroke-width="1" opacity="0.5"/>
  
  <!-- Legs -->
  <rect x="22" y="52" width="5" height="28" fill="#6D4A38" stroke="#3E2723" stroke-width="1"/>
  <rect x="73" y="52" width="5" height="28" fill="#6D4A38" stroke="#3E2723" stroke-width="1"/>
  
  <!-- Cross braces -->
  <line x1="27" y1="62" x2="73" y2="62" stroke="#5C4A38" stroke-width="2" opacity="0.7"/>
  <line x1="27" y1="72" x2="73" y2="72" stroke="#5C4A38" stroke-width="2" opacity="0.7"/>
  
  <!-- Wood grain -->
  <line x1="30" y1="40" x2="70" y2="40" stroke="#5C4A38" stroke-width="0.5" opacity="0.3"/>
  <line x1="28" y1="45" x2="72" y2="45" stroke="#5C4A38" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Shadow -->
  <ellipse cx="50" cy="80" rx="35" ry="2" fill="#000000" opacity="0.15"/>
</svg>
