<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Campfire -->
  <defs>
    <radialGradient id="campfireGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FFF44F;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E65100;stop-opacity:0.8" />
    </radialGradient>
  </defs>
  
  <!-- Logs arranged in X pattern -->
  <line x1="25" y1="65" x2="45" y2="45" stroke="#5C4A38" stroke-width="4" stroke-linecap="round"/>
  <line x1="75" y1="65" x2="55" y2="45" stroke="#5C4A38" stroke-width="4" stroke-linecap="round"/>
  <line x1="35" y1="70" x2="65" y2="70" stroke="#5C4A38" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Flames -->
  <path d="M 40 50 Q 35 35 40 20 Q 42 35 45 28 Q 48 40 50 25 Q 52 40 55 28 Q 58 35 60 20 Q 65 35 60 50 Z" fill="url(#campfireGradient)" opacity="0.9"/>
  <path d="M 45 48 Q 43 38 45 28 Q 47 38 50 32 Q 53 38 55 28 Q 57 38 55 48 Z" fill="#FFF44F" opacity="0.7"/>
  
  <!-- Embers -->
  <circle cx="40" cy="60" r="1.5" fill="#FF6F00" opacity="0.8"/>
  <circle cx="50" cy="62" r="1" fill="#FF6F00" opacity="0.7"/>
  <circle cx="60" cy="60" r="1.5" fill="#FF6F00" opacity="0.8"/>
  
  <!-- Shadow -->
  <ellipse cx="50" cy="73" rx="25" ry="2" fill="#000000" opacity="0.15"/>
</svg>
